<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var k = 'theme'
          var s = localStorage.getItem(k)
          var t =
            s === 'light' || s === 'dark'
              ? s
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          document.documentElement.setAttribute('data-theme', t)
          document.documentElement.style.colorScheme = t === 'dark' ? 'dark' : 'light'
          var m = document.querySelector('meta[name="theme-color"]')
          if (m) m.setAttribute('content', t === 'dark' ? '#0f172a' : '#f7f8fa')
        } catch (e) {}
      })()
    </script>
    <!-- Favicon: ?v= bumps cache after icon changes (GitHub Pages + browsers cache aggressively) -->
    <link rel="icon" href="/favicon.svg?v=3" type="image/svg+xml" sizes="any" />
    <link rel="shortcut icon" href="/favicon.svg?v=3" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg?v=3" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta name="theme-color" content="#f7f8fa" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Abigail Bales: full-stack developer in St. Louis. Web apps, case studies, and contact."
    />
    <title>Abigail Bales | Full-Stack Developer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
