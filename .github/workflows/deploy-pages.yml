# Builds with Vite and pushes ./dist to the gh-pages branch.
# GitHub repo → Settings → Pages → Build and deployment → Source:
#   "Deploy from a branch" → Branch: gh-pages → Folder: / (root)
#
# "Compiled successfully" in your IDE only builds locally. The live site uses
# whatever this workflow publishes — not the repo root index.html.

name: Deploy site to gh-pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
