# Builds with Vite and pushes ./dist to the gh-pages branch.
#
# REQUIRED: Settings → Pages → Source = "Deploy from a branch" → gh-pages / (root)
# Do NOT set Pages source to "GitHub Actions" for this workflow — use the branch only.
# Otherwise the site may show a blank page (main branch serves dev index.html → /src/main.jsx).
#
# "Compiled successfully" locally does not deploy; the live site is whatever gh-pages contains.

name: Deploy site to gh-pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
